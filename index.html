<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azizbek Eshimov - Portfolio</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* width */
      ::-webkit-scrollbar {
        width: 1px;
      }

      /* Track */
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }

      /* Handle */
      ::-webkit-scrollbar-thumb {
        background: #888;
      }

      /* Handle on hover */
      ::-webkit-scrollbar-thumb:hover {
        background: #555;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow-x: hidden;
      }

      .container {
        text-align: center;
        position: relative;
        width: 100%;
        max-width: 900px;
        padding: 20px;
      }

      /* Typewriter effect */
      .typewriter-container {
        min-height: 150px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 60px;
      }

      .typewriter {
        font-size: 3.5rem;
        font-weight: 700;
        color: white;
        white-space: nowrap;
        overflow: hidden;
        border-right: 4px solid white;
        letter-spacing: 2px;
        animation: typewriter 6s steps(50, end) 1s 1 normal both,
          blink 0.75s step-end infinite;
      }



      @keyframes typewriter {
        from {
          width: 0;
        }
        to {
          width: 100%;
          max-width: 95vw;
        }
      }

      @keyframes blink {
        from,
        to {
          border-right-color: white;
        }
        50% {
          border-right-color: transparent;
        }
      }

      /* Section Title */
      .section-title {
        font-size: 2.5rem;
        color: white;
        margin: 80px 0 60px;
        opacity: 0;
        animation: slideInDown 0.8s ease-out 7.5s forwards;
        font-weight: 300;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      @keyframes slideInDown {
        from {
          opacity: 0;
          transform: translateY(-50px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Achievements Grid */
      .achievements {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 50px;
        margin-top: 20px;
        max-width: 900px;
        margin-left: auto;
        margin-right: auto;
      }

      .achievement-card {
        opacity: 0;
        transform: scale(0);
        perspective: 1200px;
      }

      .achievement-card:nth-child(1) {
        animation: epicPop 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) 8.3s
          forwards;
      }

      .achievement-card:nth-child(2) {
        animation: epicPop 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) 9.6s
          forwards;
      }

      .achievement-card:nth-child(3) {
        animation: epicPop 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) 10.9s
          forwards;
      }

      @keyframes epicPop {
        0% {
          opacity: 0;
          transform: scale(0) rotateZ(-180deg) rotateX(180deg) rotateY(180deg);
          filter: blur(20px);
        }
        50% {
          opacity: 1;
          transform: scale(1.15) rotateZ(5deg) rotateX(0deg) rotateY(0deg);
          filter: blur(0px);
        }
        100% {
          opacity: 1;
          transform: scale(1) rotateZ(0deg);
          filter: blur(0px);
        }
      }

      .card {
        background: rgba(255, 255, 255, 0.98);
        border-radius: 25px;
        padding: 50px 30px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
        transition: all 0.3s ease;
        position: relative;
        overflow: visible;
      }

      .card::before {
        content: "";
        position: absolute;
        top: -5px;
        left: -5px;
        right: -5px;
        bottom: -5px;
        background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcf7f);
        border-radius: 30px;
        z-index: -1;
        opacity: 0;
        animation: glow 2s ease-in-out infinite;
      }

      .achievement-card:nth-child(1) .card::before {
        animation-delay: 8.3s;
      }

      .achievement-card:nth-child(2) .card::before {
        animation-delay: 9.6s;
      }

      .achievement-card:nth-child(3) .card::before {
        animation-delay: 10.9s;
      }

      @keyframes glow {
        0%,
        100% {
          opacity: 0;
          transform: scale(1);
        }
        50% {
          opacity: 0.6;
          transform: scale(1.05);
        }
      }

      .card:hover {
        transform: translateY(-15px) rotateX(5deg) rotateY(5deg);
        box-shadow: 0 50px 120px rgba(0, 0, 0, 0.4);
      }

      .achievement-value {
        font-size: 4.5rem;
        font-weight: 800;
        background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcf7f);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin: 20px 0 15px;
        display: block;
        opacity: 0;
        animation: scaleUpBounce 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55)
          forwards;
        filter: drop-shadow(0 5px 15px rgba(255, 107, 107, 0.4));
      }

      .achievement-card:nth-child(1) .achievement-value {
        animation-delay: 8.5s;
      }

      .achievement-card:nth-child(2) .achievement-value {
        animation-delay: 9.8s;
      }

      .achievement-card:nth-child(3) .achievement-value {
        animation-delay: 11.1s;
      }

      @keyframes scaleUpBounce {
        0% {
          opacity: 0;
          transform: scale(0) rotateZ(-45deg);
          filter: blur(15px);
        }
        60% {
          opacity: 1;
          transform: scale(1.2) rotateZ(5deg);
          filter: blur(0px);
        }
        100% {
          opacity: 1;
          transform: scale(1) rotateZ(0deg);
        }
      }

      .achievement-label {
        font-size: 1.3rem;
        color: #667eea;
        font-weight: 700;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .achievement-subtitle {
        font-size: 0.95rem;
        color: #999;
        margin-top: 12px;
        font-weight: 400;
      }

      /* Particle burst effect */
      .particle-burst {
        position: fixed;
        pointer-events: none;
        font-size: 2rem;
      }

      /* Reset animation button */
      .reset-btn {
        position: fixed;
        bottom: 30px;
        right: 30px;
        padding: 14px 28px;
        background: white;
        color: #667eea;
        border: none;
        border-radius: 50px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        z-index: 1000;
      }

      .reset-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
      }

      /* Contacts Section */
      .contacts-section {
        margin-top: 120px;
        opacity: 0;
        animation: fadeInUp 1s ease-out 12.5s forwards;
      }

      .contacts-title {
        font-size: 2.5rem;
        color: white;
        margin-bottom: 60px;
        font-weight: 300;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      .contacts-container {
        display: flex;
        justify-content: center;
        gap: 60px;
        flex-wrap: wrap;
        margin-bottom: 100px;
      }

      .contact-icon-wrapper {
        opacity: 0;
        transform: translateY(40px);
      }

      .contact-icon-wrapper:nth-child(1) {
        animation: slideIconUp 0.8s ease-out 13s forwards;
      }

      .contact-icon-wrapper:nth-child(2) {
        animation: slideIconUp 0.8s ease-out 13.5s forwards;
      }

      .contact-icon-wrapper:nth-child(3) {
        animation: slideIconUp 0.8s ease-out 14s forwards;
      }

      @keyframes slideIconUp {
        from {
          opacity: 0;
          transform: translateY(40px);
          filter: blur(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
          filter: blur(0);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .contact-link {
        text-decoration: none;
        display: inline-block;
      }

      .contact-icon {
        width: 100px;
        height: 100px;
        background: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        position: relative;
        overflow: hidden;
      }

      .contact-icon::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
          135deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        transform: rotate(45deg);
        animation: shine 3s infinite;
      }

      @keyframes shine {
        0% {
          transform: translateX(-100%) translateY(-100%) rotate(45deg);
        }
        100% {
          transform: translateX(100%) translateY(100%) rotate(45deg);
        }
      }

      .contact-icon:hover {
        transform: translateY(-15px) scale(1.1);
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.3);
      }

      .contact-label {
        margin-top: 15px;
        font-size: 0.95rem;
        color: white;
        font-weight: 500;
        letter-spacing: 0.5px;
      }

      @media (max-width: 768px) {
        .typewriter {
          font-size: 2rem;
        }
        .section-title,
        .contacts-title {
          font-size: 1.8rem;
        }
        .achievement-value {
          font-size: 3rem;
        }
        .reset-btn {
          bottom: 20px;
          right: 20px;
          padding: 10px 20px;
          font-size: 0.75rem;
        }
        .contacts-container {
          gap: 40px;
        }
        .contact-icon {
          width: 80px;
          height: 80px;
          font-size: 40px;
        }
      }

      @media (max-width: 1024px) {
        .typewriter {
          font-size: clamp(1.8rem, 5vw, 2.5rem);
        }
        .section-title,
        .contacts-title {
          font-size: clamp(1.5rem, 4vw, 2rem);
        }
        .achievement-value {
          font-size: clamp(2.5rem, 6vw, 3.5rem);
        }
        .card {
          padding: 30px 20px;
        }
        .contacts-container {
          gap: 40px;
        }
      }

      @media (max-width: 600px) {
        body {
          align-items: flex-start;
          padding-top: 40px;
        }

        .container {
          padding: 10px;
        }

        .typewriter {
          font-size: clamp(1.5rem, 6vw, 2rem);
          border-right-width: 3px;
        }

        .section-title,
        .contacts-title {
          font-size: clamp(1.2rem, 5vw, 1.6rem);
          margin: 50px 0 40px;
        }

        .achievements {
          gap: 30px;
        }

        .card {
          padding: 25px 15px;
        }

        .achievement-value {
          font-size: clamp(2rem, 8vw, 2.8rem);
        }

        .achievement-label {
          font-size: 1rem;
        }

        .achievement-subtitle {
          font-size: 0.85rem;
        }

        .contacts-container {
          flex-direction: column;
          gap: 25px;
        }

        .contact-icon {
          width: 70px;
          height: 70px;
          font-size: 35px;
        }

        .contact-label {
          font-size: 0.9rem;
        }

        .reset-btn {
          bottom: 15px;
          right: 15px;
          padding: 10px 18px;
          font-size: 0.8rem;
        }
      }

      @media (max-width: 380px) {
        .contact-icon {
          width: 60px;
          height: 60px;
          font-size: 30px;
        }
        .typewriter {
          font-size: 1.4rem;
        }
        .reset-btn {
          font-size: 0.7rem;
          padding: 8px 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="typewriter-container">
        <div class="typewriter" id="typewriter">
          Hello, I am Azizbek Eshimov
        </div>
      </div>

      <div class="section-title">My Achievements</div>

      <div class="achievements">
        <div class="achievement-card">
          <div class="card">
            <div class="achievement-value">7.5</div>
            <div class="achievement-label">IELTS</div>
            <div class="achievement-subtitle">English Proficiency</div>
          </div>
        </div>

        <div class="achievement-card">
          <div class="card">
            <div class="achievement-value">1050</div>
            <div class="achievement-label">SAT</div>
            <div class="achievement-subtitle">Academic Excellence</div>
          </div>
        </div>

        <div class="achievement-card">
          <div class="card">
            <div class="achievement-value">14</div>
            <div class="achievement-label">Years Old</div>
            <div class="achievement-subtitle">Young & Ambitious</div>
          </div>
        </div>
      </div>

      <!-- Contacts Section -->
      <div class="contacts-section">
        <div class="contacts-title">Get In Touch</div>
        <div class="contacts-container">
          <div class="contact-icon-wrapper">
            <a
              href="https://t.me/itzazizbek"
              target="_blank"
              class="contact-link"
            >
              <div class="contact-icon">📱</div>
              <div class="contact-label">Telegram</div>
            </a>
          </div>

          <div class="contact-icon-wrapper">
            <a href="mailto:itzazizbek@gmail.com" class="contact-link">
              <div class="contact-icon">📧</div>
              <div class="contact-label">Email</div>
            </a>
          </div>

          <div class="contact-icon-wrapper">
            <a
              href="https://youtube.com/@EshimovAzizbek"
              target="_blank"
              class="contact-link"
            >
              <div class="contact-icon">🎥</div>
              <div class="contact-label">YouTube</div>
            </a>
          </div>
        </div>
      </div>
    </div>


    <script>
      function createParticleBurst(x, y, emoji) {
        for (let i = 0; i < 8; i++) {
          const particle = document.createElement("div");
          particle.className = "particle-burst";
          particle.textContent = emoji;
          particle.style.left = x + "px";
          particle.style.top = y + "px";
          particle.style.position = "fixed";

          const angle = (i / 8) * Math.PI * 2;
          const velocity = 8 + Math.random() * 6;
          const vx = Math.cos(angle) * velocity;
          const vy = Math.sin(angle) * velocity;

          document.body.appendChild(particle);

          let px = x,
            py = y;
          let life = 100;

          const animate = () => {
            px += vx;
            py += vy;
            life -= 3;

            particle.style.left = px + "px";
            particle.style.top = py + "px";
            particle.style.opacity = life / 100;
            particle.style.transform = `scale(${life / 100})`;

            if (life > 0) {
              requestAnimationFrame(animate);
            } else {
              particle.remove();
            }
          };
          animate();
        }
      }

      // Trigger particle bursts at achievement times
      setTimeout(() => {
        createParticleBurst(
          window.innerWidth / 2,
          window.innerHeight / 2 + 200,
          "⭐"
        );
      }, 8300);

      setTimeout(() => {
        createParticleBurst(
          window.innerWidth / 2,
          window.innerHeight / 2 + 200,
          "🎯"
        );
      }, 9600);

      setTimeout(() => {
        createParticleBurst(
          window.innerWidth / 2,
          window.innerHeight / 2 + 200,
          "🚀"
        );
      }, 10900);

      // Auto scroll to contacts section
      setTimeout(() => {
        const contactsSection = document.querySelector(".contacts-section");
        if (contactsSection) {
          contactsSection.scrollIntoView({
            behavior: "smooth",
            block: "center",
          });
        }
      }, 12500);

      function replayAnimation() {
        // Scroll to top
        window.scrollTo({ top: 0, behavior: "smooth" });

        // Reset typewriter
        const typewriter = document.getElementById("typewriter");
        typewriter.style.animation = "none";
        typewriter.offsetHeight;
        typewriter.style.animation =
          "typewriter 6s steps(50, end) 1s 1 normal both, blink 0.75s step-end infinite";

        // Reset title
        const title = document.querySelector(".section-title");
        title.style.animation = "none";
        title.offsetHeight;
        title.style.animation = "slideInDown 0.8s ease-out 7.5s forwards";

        // Reset cards
        const cards = document.querySelectorAll(".achievement-card");
        cards.forEach((card, index) => {
          card.style.animation = "none";
          card.offsetHeight;
          card.style.animation = `epicPop 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) ${
            8.3 + index * 1.3
          }s forwards`;

          const cardElement = card.querySelector(".card");
          const cardBefore = cardElement.querySelector("::before");
          cardElement.style.animation = "none";
          cardElement.offsetHeight;

          const value = card.querySelector(".achievement-value");
          value.style.animation = "none";
          value.offsetHeight;
          value.style.animation = `scaleUpBounce 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) ${
            8.5 + index * 1.3
          }s forwards`;
        });

        // Reset contacts section
        const contactsSection = document.querySelector(".contacts-section");
        contactsSection.style.animation = "none";
        contactsSection.offsetHeight;
        contactsSection.style.animation = "fadeInUp 1s ease-out 12.5s forwards";

        const contactWrappers = document.querySelectorAll(
          ".contact-icon-wrapper"
        );
        contactWrappers.forEach((wrapper, index) => {
          wrapper.style.animation = "none";
          wrapper.offsetHeight;
          wrapper.style.animation = `slideIconUp 0.8s ease-out ${
            13 + index * 0.5
          }s forwards`;
        });

        // Particle bursts
        setTimeout(
          () =>
            createParticleBurst(
              window.innerWidth / 2,
              window.innerHeight / 2 + 200,
              "⭐"
            ),
          8300
        );
        setTimeout(
          () =>
            createParticleBurst(
              window.innerWidth / 2,
              window.innerHeight / 2 + 200,
              "🎯"
            ),
          9600
        );
        setTimeout(
          () =>
            createParticleBurst(
              window.innerWidth / 2,
              window.innerHeight / 2 + 200,
              "🚀"
            ),
          10900
        );

        // Auto scroll again
        setTimeout(() => {
          const contactsSection = document.querySelector(".contacts-section");
          if (contactsSection) {
            contactsSection.scrollIntoView({
              behavior: "smooth",
              block: "center",
            });
          }
        }, 12500);
      }
    </script>
  </body>
</html>
